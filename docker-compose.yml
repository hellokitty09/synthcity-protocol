version: "3.9"

services:
  # ═══════════════════════════════════════════════
  #  API Gateway (Backend)
  # ═══════════════════════════════════════════════
  backend:
    build: ./backend
    container_name: synthcity-api
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      # Blockchain
      - BASE_SEPOLIA_RPC=${BASE_SEPOLIA_RPC}
      - SYNTH_TOKEN_ADDR=${SYNTH_TOKEN_ADDR}
      - LAND_REGISTRY_ADDR=${LAND_REGISTRY_ADDR}
      - AGENT_REGISTRY_ADDR=${AGENT_REGISTRY_ADDR}
      - STAKING_MANAGER_ADDR=${STAKING_MANAGER_ADDR}
      - DOMAIN_MANAGER_ADDR=${DOMAIN_MANAGER_ADDR}
      - TRADE_BLOCS_ADDR=${TRADE_BLOCS_ADDR}
      - VAULT_ADDRESS=${VAULT_ADDRESS}
      - TREASURY_KEY=${TREASURY_KEY}
      # Agents
      - AGENT_1_KEY=${AGENT_1_KEY}
      - AGENT_1_FACTION=${AGENT_1_FACTION:-Neon Syndicate}
      - AGENT_1_STYLE=${AGENT_1_STYLE:-macro}
      - AGENT_2_KEY=${AGENT_2_KEY}
      - AGENT_2_FACTION=${AGENT_2_FACTION:-Obsidian Core}
      - AGENT_2_STYLE=${AGENT_2_STYLE:-geopolitical}
      # Auth
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - SESSION_DURATION_HOURS=${SESSION_DURATION_HOURS:-72}
      # Infra
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - DB_PATH=/app/data/synthcity.db
      - MAX_SSE_CLIENTS=${MAX_SSE_CLIENTS:-100}
    volumes:
      - synthcity-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - synthcity

  # ═══════════════════════════════════════════════
  #  Frontend (Next.js)
  # ═══════════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: synthcity-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - synthcity

volumes:
  synthcity-data:

networks:
  synthcity:
    driver: bridge
